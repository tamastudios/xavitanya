name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: obraslink/obraslink/package-lock.json

      - name: Install
        working-directory: obraslink/obraslink
        run: npm ci

      - name: Build
        working-directory: obraslink/obraslink
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: obraslink/obraslink/dist

      - name: Switch Pages to branch mode
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo '{"build_type":"legacy","source":{"branch":"gh-pages","path":"/"}}' | \
            gh api repos/${{ github.repository }}/pages -X PUT --input - 2>&1 || true
          echo "Current config:"
          gh api repos/${{ github.repository }}/pages --jq '{build_type,source}' 2>&1 || true
