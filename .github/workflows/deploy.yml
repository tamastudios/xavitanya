name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: obraslink/obraslink/package-lock.json

      - name: Install
        working-directory: obraslink/obraslink
        run: npm ci

      - name: Build
        working-directory: obraslink/obraslink
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: obraslink/obraslink/dist

      - name: Switch Pages source to gh-pages branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/pages \
            -X PUT \
            -H "Accept: application/vnd.github+json" \
            -f "build_type=legacy" \
            -f "source[branch]=gh-pages" \
            -f "source[path]=/"
          echo "Pages source updated to gh-pages branch (legacy mode)"
